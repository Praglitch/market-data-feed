[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mcx-data"
version = "1.1.1"
description = "Download MCX India commodity market data as pandas DataFrames — spot prices (recent + archive), futures bhavcopy. Works on AWS Lambda."
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [
    {name = "Nikhil Suthar", email = "nikhil.suthar@lumiq.ai"},
]
keywords = ["mcx", "mcx-data", "mcx-india", "commodity", "futures", "options", "gold", "silver", "crude-oil", "natural-gas", "india", "market-data", "financial-data", "pandas", "bhavcopy", "trading", "historical-data"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Financial and Insurance Industry",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business :: Financial :: Investment",
    "Typing :: Typed",
]
dependencies = [
    "requests>=2.31.0",
    "pandas>=2.0.0",
    "openpyxl>=3.1.0",
    "curl-cffi>=0.7.0",
]

[project.optional-dependencies]
s3 = ["boto3>=1.28.0"]
polars = ["polars>=0.20.0"]
dev = ["pytest", "pytest-cov", "ruff"]

[project.scripts]
mcx-data = "mcxdata.cli:main"

[project.urls]
Homepage = "https://github.com/NikhilSuthar/indian-market-data"
Documentation = "https://NikhilSuthar.github.io/indian-market-data"
Repository = "https://github.com/NikhilSuthar/indian-market-data"
"Bug Tracker" = "https://github.com/NikhilSuthar/indian-market-data/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
target-version = "py39"
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
