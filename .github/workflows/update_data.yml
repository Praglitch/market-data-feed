name: Daily Market Data Update

on:
  schedule:
    - cron: '00 13 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas yfinance google-api-python-client google-auth-oauthlib google-auth-httplib2

      - name: Decode OAuth credentials
        run: |
          mkdir -p credentials
          echo "${{ secrets.OAUTH_CLIENT_JSON }}" | base64 -d > credentials/oauth_client.json
          echo "${{ secrets.TOKEN_PICKLE }}" | base64 -d > credentials/token.pickle

      - name: Download existing data from Google Drive
        run: |
          python -c "
from customdata.drive_client import authenticate, get_root_folder_id, get_subfolder_id, list_files_in_folder, download_file_as_df
import os
import pandas as pd

service = authenticate()
root_id = get_root_folder_id(service)

folders = ['nifty50_scrips', 'nifty50_index', 'nifty500_scrips', 'nifty500_index']
for folder in folders:
    folder_id = get_subfolder_id(service, folder, root_id)
    if not folder_id:
        print(f'Folder {folder} not found, skipping')
        continue
    os.makedirs(f'data/{folder}', exist_ok=True)
    files = list_files_in_folder(service, folder_id)
    for f in files:
        if not f['name'].endswith('.csv'):
            continue
        print(f'Downloading {folder}/{f[\"name\"]}...')
        df = download_file_as_df(service, f['id'])
        df.to_csv(f'data/{folder}/{f[\"name\"]}', index=False)
          "

      - name: Run local updater
        run: python scripts/update_local.py

      - name: Upload updated files to Drive
        run: python scripts/upload_good_only.py