name: Daily Market Data Update

on:
  schedule:
    - cron: '00 13 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas yfinance google-api-python-client google-auth-oauthlib google-auth-httplib2

      - name: Decode OAuth credentials
        run: |
          mkdir -p credentials
          echo "${{ secrets.OAUTH_CLIENT_JSON }}" | base64 -d > credentials/oauth_client.json
          echo "${{ secrets.TOKEN_PICKLE }}" | base64 -d > credentials/token.pickle

      - name: Run local updater
        run: python scripts/update_local.py

      - name: Upload updated files to Drive
        run: python scripts/upload_good_only.py