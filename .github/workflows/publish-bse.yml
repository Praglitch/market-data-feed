name: Publish bse-index-data

# Triggers:
#   - Push tag  bse-v*          → build + publish to PyPI + create GitHub Release
#   - Manual dispatch           → publish to TestPyPI or PyPI (your choice)

on:
  push:
    tags:
      - "bse-v*"          # e.g. bse-v1.0.0
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options: [testpypi, pypi]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build bse-index-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
        working-directory: packages/bse-data
      - uses: actions/upload-artifact@v4
        with:
          name: bse-data-dist
          path: packages/bse-data/dist/

  publish-testpypi:
    name: Publish bse-index-data → TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/project/bse-index-data/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bse-data-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish bse-index-data → PyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/bse-v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/project/bse-index-data/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bse-data-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release — bse-index-data
    needs: publish-pypi
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/bse-v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: bse-data-dist
          path: dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "bse-index-data ${{ github.ref_name }}"
          body: |
            ## bse-index-data ${{ github.ref_name }}

            Python library to download BSE India index data as pandas DataFrames.
            SENSEX, BSE500, BANKEX and 55+ indices — historical OHLC + live quotes.
            Works on AWS Lambda via `curl_cffi` Chrome TLS impersonation.

            ### Install
            ```bash
            pip install bse-index-data==${{ github.ref_name }}
            ```

            ### What's included
            - `get_index(name, from, to)` — historical OHLC for any of 55 registered indices
            - `get_all_indices(date)` — all 120+ indices for one date (single call)
            - `get_live_sensex()` — real-time SENSEX quote
            - 55 indices: Broad Market, Sectoral, Thematic, Strategy, Global

            ### Links
            - [PyPI](https://pypi.org/project/bse-index-data/)
            - [Documentation](https://NikhilSuthar.github.io/indian-market-data/bse)
          files: dist/*
          draft: false
          prerelease: false
