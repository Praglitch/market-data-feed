name: Publish mcx-data

# Triggers:
#   - Push tag  mcx-v*          → build + publish to PyPI + create GitHub Release
#   - Manual dispatch           → publish to TestPyPI or PyPI (your choice)

on:
  push:
    tags:
      - "mcx-v*"          # e.g. mcx-v1.0.0
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options: [testpypi, pypi]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build mcx-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
        working-directory: packages/mcx-data
      - uses: actions/upload-artifact@v4
        with:
          name: mcx-data-dist
          path: packages/mcx-data/dist/

  publish-testpypi:
    name: Publish mcx-data → TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/project/mcx-data/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mcx-data-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish mcx-data → PyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/mcx-v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/project/mcx-data/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mcx-data-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release — mcx-data
    needs: publish-pypi
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/mcx-v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: mcx-data-dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "mcx-data ${{ github.ref_name }}"
          body: |
            ## mcx-data ${{ github.ref_name }}

            Python library to download MCX India commodity spot market data as pandas DataFrames.
            Works on AWS Lambda via `curl_cffi` Chrome TLS impersonation (bypasses Akamai WAF).

            ### Install
            ```bash
            pip install mcx-data==${{ github.ref_name }}
            ```

            ### What's included
            - `get_spot_recent()` — today's spot prices for all 28 commodities
            - `get_spot_archive()` — historical spot prices by commodity + date range
            - Date column: `YYYY-MM-DD HH:MM:SS` (UTC)
            - 28 commodities: GOLD, SILVER, CRUDEOIL, NATURALGAS, COPPER, ALUMINIUM, and more

            ### Links
            - [PyPI](https://pypi.org/project/mcx-data/)
            - [Documentation](https://NikhilSuthar.github.io/indian-market-data/mcx-spot)
          files: dist/*
          draft: false
          prerelease: false
