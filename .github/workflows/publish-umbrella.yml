name: Publish indian-market-data (umbrella)

# Triggers:
#   - Push tag  v*              → build + publish to PyPI + create GitHub Release
#   - Manual dispatch           → publish to TestPyPI or PyPI

on:
  push:
    tags:
      - "v*"              # e.g. v1.0.0
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options: [testpypi, pypi]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build indian-market-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
        working-directory: packages/indian-market-data
      - uses: actions/upload-artifact@v4
        with:
          name: umbrella-dist
          path: packages/indian-market-data/dist/

  publish-testpypi:
    name: Publish indian-market-data → TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/project/indian-market-data/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: umbrella-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish indian-market-data → PyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/project/indian-market-data/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: umbrella-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release — indian-market-data
    needs: publish-pypi
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: umbrella-dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "indian-market-data ${{ github.ref_name }}"
          body: |
            ## indian-market-data ${{ github.ref_name }}

            Umbrella package for NSE + MCX India market data as pandas DataFrames.
            Installs both `nse-data` and `mcx-data`.

            ### Install
            ```bash
            pip install indian-market-data==${{ github.ref_name }}
            ```

            ### Includes
            - `nse-data 1.0.0` — 86+ NSE datasets (equities, F&O, debt, indices, EGR)
            - `mcx-data 1.0.0` — MCX commodity spot prices (28 commodities)

            ### Quick Start
            ```python
            from nsedata import nse
            from mcxdata import mcx

            df = nse.get("capital_market", "equities_sme", "sec_bhavdata_full", "2026-05-22")
            df = mcx.get_spot_recent(commodity="GOLD")
            ```

            ### Links
            - [PyPI](https://pypi.org/project/indian-market-data/)
            - [Documentation](https://NikhilSuthar.github.io/indian-market-data)
          files: dist/*
          draft: false
          prerelease: false
